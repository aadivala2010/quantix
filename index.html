<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Quantix | Math Mastery K-12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#58cc02;--green-dark:#3a8f00;--green-deeper:#2a6e00;
  --red:#ff4b4b;--red-bg:#fff0f0;
  --correct-bg:#f0fff0;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdafe;
  --gold:#f59e0b;--gold-dark:#b45309;
  --bg:#f0f4f0;--surface:#fff;--surface2:#f7f9f7;
  --text:#1a2e1a;--text2:#4a6349;--text3:#7a9479;
  --border:#dde8dd;--radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --font:'Nunito',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--green);display:flex;flex-direction:column;padding:20px 14px;gap:4px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{color:#fff;font-size:22px;font-weight:800;letter-spacing:-0.5px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.25);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.streak-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;margin-top:8px;margin-bottom:8px;color:#fff;}
.streak-badge span{font-size:14px;}
.switch-level-btn{background:rgba(0,0,0,0.2);border:none;border-radius:var(--radius-sm);color:#fff;font-size:11px;font-weight:700;font-family:var(--font);padding:8px 10px;cursor:pointer;transition:background 0.15s;margin-top:4px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.switch-level-btn:hover{background:rgba(0,0,0,0.35)}
.subject-btn{background:rgba(255,255,255,0.12);border:none;border-radius:var(--radius-sm);color:#fff;font-size:12px;font-weight:700;font-family:var(--font);padding:8px 10px;cursor:pointer;text-align:left;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.subject-btn:hover{background:rgba(255,255,255,0.25)}
.subject-btn.active{background:rgba(255,255,255,0.95);color:var(--green-dark)}
.sidebar-spacer{flex:1}
.reset-btn{background:rgba(0,0,0,0.15);border:none;border-radius:var(--radius-sm);color:rgba(255,255,255,0.85);font-size:11px;font-weight:700;font-family:var(--font);padding:8px 10px;cursor:pointer;transition:background 0.15s;margin-top:4px}
.reset-btn:hover{background:rgba(0,0,0,0.25)}
.main{flex:1;padding:32px 28px;overflow-y:auto}
.screen{display:none}
.screen.active{display:block}
.map-header{margin-bottom:28px}
.map-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.map-sub{font-size:14px;color:var(--text2);margin-top:4px}
.trail{display:flex;flex-direction:column;align-items:center;gap:0;max-width:280px;margin:0 auto}
.checkpoint-wrap{display:flex;flex-direction:column;align-items:center}
.connector{width:4px;height:28px;background:var(--border);border-radius:2px}
.connector.done{background:var(--green)}
.checkpoint-btn{width:76px;height:76px;border-radius:50%;border:4px solid transparent;font-size:24px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-family:var(--font)}
.checkpoint-btn.locked{background:#e8ede8;border-color:#c8d4c8;cursor:not-allowed;opacity:0.7}
.checkpoint-btn.available{background:var(--surface);border-color:var(--green);box-shadow:0 5px 0 var(--green-dark)}
.checkpoint-btn.available:hover{transform:translateY(-3px);box-shadow:0 8px 0 var(--green-dark)}
.checkpoint-btn.available:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-dark)}
.checkpoint-btn.complete{background:var(--green);border-color:var(--green-dark);box-shadow:0 5px 0 var(--green-deeper);color:#fff}
.checkpoint-btn.perfect{background:var(--gold);border-color:var(--gold-dark);box-shadow:0 5px 0 #92400e;color:#fff}
.cp-stars{font-size:10px;line-height:1}
.cp-label{font-size:11px;font-weight:700;color:var(--text2);margin-top:6px;text-align:center;max-width:90px;line-height:1.3}
.unit-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:20px;max-width:400px;margin-left:auto;margin-right:auto;box-shadow:var(--shadow)}
.unit-panel-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px}
.unit-panel-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.badge-container{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.status-badge{background:var(--surface2);border-radius:40px;padding:6px 12px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.status-badge.practice-pass{background:#d7ffb8;color:var(--green-dark)}
.status-badge.test-pass{background:#fef3c7;color:var(--gold-dark)}
.status-badge.locked{background:#f3f4f6;color:#9ca3af}
.panel-actions{display:flex;gap:10px}
.btn-practice{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 18px;font-size:14px;font-weight:800;font-family:var(--font);cursor:pointer;flex:1;border-bottom:4px solid var(--green-dark);transition:all 0.1s}
.btn-practice:active{border-bottom-width:1px;transform:translateY(3px)}
.btn-practice.disabled{opacity:0.5;cursor:not-allowed;pointer-events:none}
.btn-test{background:var(--surface);color:var(--green);border:2px solid var(--green);border-radius:var(--radius-sm);padding:12px 18px;font-size:14px;font-weight:800;font-family:var(--font);cursor:pointer;flex:1;transition:background 0.1s}
.btn-test:hover:not(.disabled){background:var(--correct-bg)}
.btn-test.disabled{opacity:0.5;cursor:not-allowed;background:#f3f4f6;border-color:#d1d5db;color:#9ca3af;pointer-events:none}
.locked-message{font-size:11px;color:var(--red);margin-top:8px;text-align:center}
.q-screen{max-width:620px;margin:0 auto}
.difficulty-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;margin-bottom:12px}
.difficulty-easy{background:#d7ffb8;color:var(--green-dark)}
.difficulty-medium{background:#fef3c7;color:var(--gold-dark)}
.difficulty-hard{background:#fee2e2;color:var(--red)}
.quiz-header-actions{display:flex;align-items:center;gap:12px;margin-bottom:12px;justify-content:space-between}
.quiz-stats{font-size:13px;font-weight:700;background:var(--surface2);padding:6px 12px;border-radius:40px;color:var(--text2)}
.quit-quiz-btn{background:var(--surface);color:var(--red);border:2px solid var(--red);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all 0.1s}
.quit-quiz-btn:hover{background:var(--red-bg)}
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.hearts{display:flex;gap:4px}
.heart{font-size:22px}
.heart.lost{filter:grayscale(1);opacity:0.35}
.progress-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:13px;overflow:hidden}
.progress-bar{height:100%;background:var(--green);border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.q-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:18px;box-shadow:var(--shadow)}
.q-topic{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.q-text{font-size:21px;font-weight:800;color:var(--text);line-height:1.4;text-align:center;font-family:var(--mono)}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:15px 20px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;text-align:left;color:var(--text);transition:all 0.12s;display:flex;align-items:center;gap:12px;box-shadow:0 2px 0 var(--border)}
.opt-btn:hover:not(:disabled){border-color:var(--green);background:var(--correct-bg);box-shadow:0 2px 0 var(--green)}
.opt-btn.correct{border-color:var(--green);background:var(--correct-bg);color:var(--green-dark);box-shadow:0 2px 0 var(--green)}
.opt-btn.wrong{border-color:var(--red);background:var(--red-bg);color:#b00;box-shadow:0 2px 0 var(--red)}
.opt-btn:disabled{cursor:not-allowed}
.opt-letter{width:30px;height:30px;border-radius:7px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text2);flex-shrink:0}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff;border-color:var(--green-dark)}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff;border-color:#c00}
.feedback-bar{border-radius:var(--radius-sm);padding:14px 18px;margin-top:14px;display:none;align-items:center;gap:12px}
.feedback-bar.show{display:flex}
.feedback-bar.correct{background:#d7ffb8;border:1.5px solid var(--green)}
.feedback-bar.wrong{background:var(--red-bg);border:1.5px solid var(--red)}
.fb-icon{font-size:20px}
.fb-text{font-size:15px;font-weight:800}
.fb-text.correct{color:var(--green-dark)}
.fb-text.wrong{color:#b00}
.next-btn{display:none;margin-top:14px;width:100%;background:var(--green);color:#fff;border:none;border-bottom:4px solid var(--green-dark);border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all 0.1s}
.next-btn:active{border-bottom-width:1px;transform:translateY(3px)}
.next-btn.show{display:block}
.expl-panel{margin-top:14px;border-radius:var(--radius-sm);border:1.5px solid var(--blue-border);background:var(--blue-bg);overflow:hidden;animation:slideIn 0.3s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.expl-header{display:flex;align-items:center;gap:8px;padding:11px 16px;background:rgba(37,99,235,0.08);border-bottom:1px solid var(--blue-border)}
.expl-badge{font-size:12px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em}
.expl-body{padding:14px 16px;font-size:14px;line-height:1.7;color:#1e3a5f}
.step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step-num{min-width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{flex:1;padding-top:3px}
.math{font-family:var(--mono);font-size:13px;background:rgba(37,99,235,0.1);border-radius:5px;padding:2px 7px;display:inline-block;margin:3px 0}
.expl-tip{margin-top:10px;padding:10px 14px;background:rgba(37,99,235,0.08);border-radius:var(--radius-sm);border-left:3px solid var(--blue);font-size:13px;color:#1e3a5f;font-weight:600}
.result-screen-inner{text-align:center;padding:40px 20px;max-width:420px;margin:0 auto}
.result-icon{font-size:68px;margin-bottom:16px}
.result-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px}
.result-sub{font-size:15px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 22px;min-width:100px;box-shadow:var(--shadow)}
.stat-val{font-size:24px;font-weight:800;color:var(--text)}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;font-weight:600}
.result-btn{background:var(--green);color:#fff;border:none;border-bottom:4px solid var(--green-dark);border-radius:var(--radius-sm);padding:14px 36px;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer}
.level-selector-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease}
.level-selector-card{background:var(--surface);border-radius:40px;padding:40px 32px;max-width:500px;width:90%;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,0.3);border:3px solid var(--gold)}
.level-selector-card h2{font-size:32px;font-weight:800;color:var(--text);margin-bottom:12px}
.level-selector-card p{color:var(--text2);margin-bottom:32px;font-size:16px}
.level-grid{display:flex;flex-direction:column;gap:16px;margin-bottom:20px}
.level-choice-btn{background:var(--surface2);border:2px solid var(--border);border-radius:60px;padding:18px;font-size:20px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:14px}
.level-choice-btn:hover{background:var(--correct-bg);border-color:var(--green);transform:scale(1.02)}
.level-choice-btn.elem{background:#d7ffb8;border-color:var(--green)}
.level-choice-btn.middle{background:#fef3c7;border-color:var(--gold)}
.level-choice-btn.high{background:#fee2e2;border-color:var(--red)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:700px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;overflow-x:auto;padding:10px;gap:4px;position:static}
  .logo{display:none}
  .subject-btn{font-size:11px;padding:6px 10px;white-space:nowrap;flex:0 0 auto}
  .reset-btn,.switch-level-btn{flex:0 0 auto;font-size:10px;padding:6px 10px}
  .main{padding:16px 12px}
  .q-text{font-size:17px}
  .opt-btn{font-size:13px;padding:12px 14px}
  .opt-letter{width:26px;height:26px;font-size:11px}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo"><div class="logo-mark">Q</div>Quantix</div>
    <div class="streak-badge" id="streak-display">🔥 <span id="streak-count">0</span> day streak</div>
    <button class="switch-level-btn" id="switch-level-btn" onclick="showLevelSelector()">🔄 Switch Level</button>
    <div id="subject-buttons-container"></div>
    <div class="sidebar-spacer"></div>
    <button class="reset-btn" onclick="resetAllProgress()">🗑 Reset Progress</button>
  </div>
  <div class="main">
    <div id="map-screen" class="screen active"></div>
    <div id="quiz-screen" class="screen"></div>
    <div id="result-screen" class="screen"></div>
  </div>
</div>
<script>
// ======================== SCHOOL LEVEL SYSTEM ========================
const levelSubjects = {
  "Elementary": ["1st Grade", "2nd Grade", "3rd Grade", "4th Grade", "5th Grade"],
  "Middle": ["6th Grade", "7th Grade", "8th Grade"],
  "High": ["Algebra 1", "Algebra 2", "Geometry", "Pre-Calc", "Calculus"]
};

let currentLevel = localStorage.getItem('qx_current_level') || null;
let currentSubject = localStorage.getItem('qx_current_subject') || "1st Grade";

function getProgressKey() { return `qx_progress_${currentLevel ? currentLevel.toLowerCase() : 'elem'}`; }
function loadProgress() { return JSON.parse(localStorage.getItem(getProgressKey()) || '{}'); }
function saveProgressToLevel(progressObj) { localStorage.setItem(getProgressKey(), JSON.stringify(progressObj)); }
let progress = loadProgress();

function rebuildSidebar() {
  const container = document.getElementById('subject-buttons-container');
  if(!container) return;
  container.innerHTML = '';
  if(!currentLevel) return;
  const subjects = levelSubjects[currentLevel];
  const icons = {'1st Grade':'🌟','2nd Grade':'🐧','3rd Grade':'🦊','4th Grade':'🦁','5th Grade':'🚀','6th Grade':'⚡','7th Grade':'🔬','8th Grade':'🎯','Algebra 1':'📐','Algebra 2':'📊','Geometry':'🔺','Pre-Calc':'📡','Calculus':'∫'};
  subjects.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'subject-btn';
    if(currentSubject === sub) btn.classList.add('active');
    btn.innerHTML = `<span>${icons[sub] || '📚'}</span>${sub}`;
    btn.onclick = () => { switchSubject(sub); };
    container.appendChild(btn);
  });
}

function showLevelSelector() {
  const overlay = document.createElement('div'); overlay.className='level-selector-overlay'; overlay.id='level-selector';
  overlay.innerHTML = `<div class="level-selector-card"><h2>📚 Choose Your Level</h2><p>Select your school level to begin or switch</p><div class="level-grid"><button class="level-choice-btn elem" data-level="Elementary">🏫 Elementary School<br><span style="font-size:14px;">Grades 1-5</span></button><button class="level-choice-btn middle" data-level="Middle">📘 Middle School<br><span style="font-size:14px;">Grades 6-8</span></button><button class="level-choice-btn high" data-level="High">🎓 High School<br><span style="font-size:14px;">Algebra 1 to Calculus</span></button></div></div>`;
  document.body.appendChild(overlay);
  document.querySelectorAll('.level-choice-btn').forEach(btn => {
    btn.onclick = () => {
      const level = btn.getAttribute('data-level');
      currentLevel = level;
      localStorage.setItem('qx_current_level', level);
      currentSubject = levelSubjects[level][0];
      localStorage.setItem('qx_current_subject', currentSubject);
      progress = loadProgress();
      const ov = document.getElementById('level-selector');
      if(ov) ov.remove();
      rebuildSidebar();
      showMap();
      updateStreakDisplay();
    };
  });
}

// ======================== DETAILED EXPLANATION GENERATOR (ALL LEVELS) ========================
function getDetailedExplanation(unitName, question, answer, difficulty) {
  // ---------- ELEMENTARY ----------
  if(unitName === "Addition") {
    const match = question.match(/(\d+)\s*\+\s*(\d+)/);
    if(match) {
      const a = parseInt(match[1]), b = parseInt(match[2]);
      return { steps: [
        { text: "Start with the first number:", math: `${a}` },
        { text: `Count up ${b} more:`, math: `${a} → ${a+1} → ${a+2} → ... → ${a+b}` },
        { text: "The sum is:", math: `${a+b}` }
      ], tip: "Addition means putting numbers together. Count up from the first number." };
    }
  }
  if(unitName === "Subtraction") {
    const match = question.match(/(\d+)\s*-\s*(\d+)/);
    if(match) {
      const a = parseInt(match[1]), b = parseInt(match[2]);
      return { steps: [
        { text: "Start with:", math: `${a}` },
        { text: `Count down ${b} steps:`, math: `${a} → ${a-1} → ${a-2} → ... → ${a-b}` },
        { text: "The difference is:", math: `${a-b}` }
      ], tip: "Subtraction means taking away. Count backwards." };
    }
  }
  if(unitName === "Multiplication") {
    const match = question.match(/(\d+)\s*[×x]\s*(\d+)/);
    if(match) {
      const a = parseInt(match[1]), b = parseInt(match[2]);
      const repeated = Array(b).fill(a).join(' + ');
      return { steps: [
        { text: "Multiplication is repeated addition:", math: `${a} × ${b} = ${repeated}` },
        { text: `Add ${a} to itself ${b} times:`, math: `${repeated} = ${a*b}` },
        { text: "The product is:", math: `${a*b}` }
      ], tip: "Think of multiplication as adding the same number over and over." };
    }
  }
  if(unitName === "Division") {
    const match = question.match(/(\d+)\s*÷\s*(\d+)/);
    if(match) {
      const a = parseInt(match[1]), b = parseInt(match[2]);
      return { steps: [
        { text: `How many groups of ${b} fit into ${a}?`, math: `${b} × ? = ${a}` },
        { text: `Since ${b} × ${a/b} = ${a}`, math: `? = ${a/b}` },
        { text: "The quotient is:", math: `${a/b}` }
      ], tip: "Division splits a number into equal groups." };
    }
  }
  if(unitName === "Percentages") {
    const match = question.match(/(\d+)% of (\d+)/);
    if(match) {
      const p = parseInt(match[1]), total = parseInt(match[2]);
      const result = (p/100)*total;
      return { steps: [
        { text: `To find ${p}% of ${total}:`, math: `${p}% = ${p}/100 = ${p/100}` },
        { text: `Multiply:`, math: `${p/100} × ${total} = ${result}` }
      ], tip: "Percent means 'per hundred'. Divide by 100 first, then multiply." };
    }
  }
  if(unitName === "Integers") {
    const match = question.match(/(-?\d+)\s*\+\s*(-?\d+)/);
    if(match) {
      const a = parseInt(match[1]), b = parseInt(match[2]);
      return { steps: [
        { text: "Start with:", math: `${a}` },
        { text: `Add ${b}:`, math: `Move ${b>0 ? 'right' : 'left'} ${Math.abs(b)} steps on number line` },
        { text: "Result:", math: `${a+b}` }
      ], tip: "On a number line, adding positive moves right, negative moves left." };
    }
  }
  if(unitName === "Equations") {
    const match = question.match(/(\d+)x\s*=\s*(\d+)/);
    if(match) {
      const a = parseInt(match[1]), b = parseInt(match[2]);
      return { steps: [
        { text: "Start with:", math: `${a}x = ${b}` },
        { text: `Divide both sides by ${a}:`, math: `x = ${b} ÷ ${a} = ${b/a}` }
      ], tip: "To solve for x, divide both sides by the coefficient." };
    }
  }
  // ---------- HIGH SCHOOL (already detailed, but add more) ----------
  if(unitName === "Linear Equations" && question.match(/(\d+)x \+ (\d+) = (\d+)/)) {
    const m = question.match(/(\d+)x \+ (\d+) = (\d+)/);
    const a = parseInt(m[1]), b = parseInt(m[2]), c = parseInt(m[3]);
    return { steps: [
      { text: "Start with the equation:", math: `${a}x + ${b} = ${c}` },
      { text: `Subtract ${b} from both sides:`, math: `${a}x = ${c-b}` },
      { text: `Divide both sides by ${a}:`, math: `x = ${(c-b)/a}` }
    ], tip: "Isolate x by undoing addition first, then division." };
  }
  if(unitName === "Quadratics" && question.match(/x² = (\d+)/)) {
    const m = question.match(/x² = (\d+)/);
    const val = parseInt(m[1]);
    return { steps: [
      { text: "Start with:", math: `x² = ${val}` },
      { text: "Take square root of both sides:", math: `x = ±√${val}` },
      { text: "Simplify:", math: `x = ±${Math.sqrt(val)}` }
    ], tip: "Remember: square roots can be positive or negative." };
  }
  if(unitName === "Trig Basics") {
    const val = answer;
    let explanation = "";
    if(question.includes("sin(30°)")) explanation = "sin(30°) = opposite/hypotenuse = 1/2 = 0.5";
    else if(question.includes("cos(60°)")) explanation = "cos(60°) = adjacent/hypotenuse = 1/2 = 0.5";
    else if(question.includes("tan(45°)")) explanation = "tan(45°) = opposite/adjacent = 1/1 = 1";
    else if(question.includes("sin(90°)")) explanation = "sin(90°) = opposite/hypotenuse = 1/1 = 1";
    else if(question.includes("cos(0°)")) explanation = "cos(0°) = adjacent/hypotenuse = 1/1 = 1";
    else if(question.includes("sin(60°)")) explanation = "sin(60°) = √3/2 ≈ 0.866";
    else if(question.includes("cos(30°)")) explanation = "cos(30°) = √3/2 ≈ 0.866";
    else explanation = `The value of ${question} is ${val}`;
    return { steps: [
      { text: "Recall the unit circle value:", math: question },
      { text: explanation, math: `= ${val}` }
    ], tip: "Memorize the unit circle for common angles: 0°, 30°, 45°, 60°, 90°." };
  }
  if(unitName === "Limits") {
    return { steps: [
      { text: "This is a limit problem - direct substitution works:", math: question },
      { text: "Substitute the x value:", math: `= ${answer}` }
    ], tip: "For continuous functions, just plug in the x value directly." };
  }
  if(unitName === "Derivatives") {
    return { steps: [
      { text: "Apply the power rule:", math: "d/dx[xⁿ] = n·xⁿ⁻¹" },
      { text: "Simplify:", math: answer }
    ], tip: "Power rule: multiply by the exponent, then subtract 1 from the exponent." };
  }
  if(unitName === "Chain Rule") {
    return { steps: [
      { text: "Use the chain rule:", math: "d/dx[f(g(x))] = f'(g(x)) · g'(x)" },
      { text: "Differentiate outer function, then inner:", math: answer }
    ], tip: "Chain rule: derivative of outside × derivative of inside." };
  }
  if(unitName === "Integrals") {
    return { steps: [
      { text: "Use the power rule for integration:", math: "∫ xⁿ dx = xⁿ⁺¹/(n+1) + C" },
      { text: "Result:", math: answer }
    ], tip: "Add 1 to exponent, divide by new exponent, add +C." };
  }
  // Fallback for any other unit
  return { steps: [
    { text: "Problem:", math: question },
    { text: "Solution:", math: answer }
  ], tip: "Practice makes perfect!" };
}

function renderExplanation(unitName, question, answer, difficulty) {
  const container = document.getElementById('expl-container');
  if(!container) return;
  const data = getDetailedExplanation(unitName, question, answer, difficulty);
  const stepsHtml = data.steps.map((s, i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${esc(s.text)}${s.math ? `<div class="math">${esc(s.math)}</div>` : ''}</div></div>`).join('');
  const tipHtml = data.tip ? `<div class="expl-tip">💡 ${esc(data.tip)}</div>` : '';
  container.innerHTML = `<div class="expl-panel"><div class="expl-header"><span>🧠</span><span class="expl-badge">Step-by-step (${difficulty})</span></div><div class="expl-body">${stepsHtml}${tipHtml}</div></div>`;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function r(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ======================== QUESTION GENERATORS (UNCHANGED - KEEP AS IS) ========================
function generateQuestionForGrade(grade, unitName, difficulty) {
  // Elementary
  if(grade === "1st Grade") {
    if(unitName === "Addition") { const a=r(1,8), b=r(1,8); return [`${a} + ${b} = ?`, `${a+b}`]; }
    if(unitName === "Subtraction") { const a=r(5,15), b=r(1,5); return [`${a} - ${b} = ?`, `${a-b}`]; }
    return [`3 + 4 = ?`, `7`];
  }
  if(grade === "2nd Grade") {
    if(unitName === "Addition") { const a=r(10,40), b=r(5,30); return [`${a} + ${b} = ?`, `${a+b}`]; }
    if(unitName === "Multiplication") { const t=[2,5,10][r(0,2)], m=r(2,8); return [`${t} × ${m} = ?`, `${t*m}`]; }
    return [`15 + 7 = ?`, `22`];
  }
  if(grade === "3rd Grade") {
    if(unitName === "Multiplication") { const a=r(2,9), b=r(2,9); return [`${a} × ${b} = ?`, `${a*b}`]; }
    if(unitName === "Division") { const b=r(2,8), a=b*r(2,10); return [`${a} ÷ ${b} = ?`, `${a/b}`]; }
    return [`6 × 7 = ?`, `42`];
  }
  if(grade === "4th Grade") {
    if(unitName === "Multiplication") { const a=r(10,50), b=r(2,12); return [`${a} × ${b} = ?`, `${a*b}`]; }
    return [`25 × 4 = ?`, `100`];
  }
  if(grade === "5th Grade") {
    if(unitName === "Multiplication") { const a=r(20,100), b=r(3,15); return [`${a} × ${b} = ?`, `${a*b}`]; }
    return [`36 × 5 = ?`, `180`];
  }
  // Middle
  if(grade === "6th Grade") {
    if(unitName === "Percentages") { return [`What is 50% of 200?`, `100`]; }
    if(unitName === "Integers") { const a=r(-10,10), b=r(-5,5); return [`${a} + ${b} = ?`, `${a+b}`]; }
    return [`25% of 80 = ?`, `20`];
  }
  if(grade === "7th Grade") {
    if(unitName === "Equations") { const x=r(2,8); return [`2x = ${2*x}`, `${x}`]; }
    return [`x + 5 = 12`, `7`];
  }
  if(grade === "8th Grade") {
    if(unitName === "Linear Equations") { const x=r(2,10); return [`2x + 3 = ${2*x+3}`, `${x}`]; }
    if(unitName === "Pythagorean Theorem") { return [`3² + 4² = c², find c`, `5`]; }
    return [`3x = 15`, `5`];
  }
  // High School
  if(grade === "Algebra 1") {
    if(unitName === "Linear Equations") { const a=r(2,5), b=r(3,12), x=r(2,8); return [`${a}x + ${b} = ${a*x+b}`, `${x}`]; }
    if(unitName === "Quadratics") { const x=r(3,8); return [`x² = ${x*x}`, `${x}`]; }
    if(unitName === "Factoring") { const a=r(1,4), b=r(2,6); return [`Factor x² + ${a+b}x + ${a*b}`, `(x+${a})(x+${b})`]; }
    return [`2x + 4 = 10`, `3`];
  }
  if(grade === "Algebra 2") {
    if(unitName === "Complex Quadratics") { const a=r(2,5), b=r(3,7); return [`Solve x² - ${a+b}x + ${a*b} = 0`, `x = ${a}, ${b}`]; }
    if(unitName === "Exponents") { const p=r(2,5); return [`2^${p} = ?`, `${Math.pow(2,p)}`]; }
    if(unitName === "Logarithms") { const p=r(2,6); return [`log₂(2^${p}) = ?`, `${p}`]; }
    return [`2^4 = ?`, `16`];
  }
  if(grade === "Geometry") {
    if(unitName === "Area") { const s=r(3,12); return [`Area of square with side ${s}?`, `${s*s}`]; }
    if(unitName === "Angles") { const a=r(40,80); return [`Triangle has angles ${a}° and 50°, find third?`, `${180-a-50}°`]; }
    if(unitName === "Circles") { const rad=r(2,8); return [`Area of circle with radius ${rad}? (use π≈3.14)`, `${Math.round(3.14*rad*rad)}`]; }
    return [`Area of square side 5`, `25`];
  }
  if(grade === "Pre-Calc") {
    if(unitName === "Trig Basics") { const trigs = [["sin(30°)","0.5"],["cos(60°)","0.5"],["tan(45°)","1"],["sin(90°)","1"],["cos(0°)","1"],["sin(60°)","0.866"],["cos(30°)","0.866"]]; return trigs[r(0,6)]; }
    if(unitName === "Sequences") { const n=r(5,15); return [`1 + 2 + ... + ${n} = ?`, `${n*(n+1)/2}`]; }
    if(unitName === "Exponentials") { const p=r(2,5); return [`3^${p} = ?`, `${Math.pow(3,p)}`]; }
    return [`sin(30°) = ?`, `0.5`];
  }
  if(grade === "Calculus") {
    if(unitName === "Limits") { const a=r(2,8), b=r(1,10); return [`lim x→${a} of (x + ${b})`, `${a+b}`]; }
    if(unitName === "Derivatives") { const p=r(2,5); return [`d/dx of x^${p}`, `${p}x^${p-1}`]; }
    if(unitName === "Chain Rule") { const a=r(1,3), p=r(2,4); return [`d/dx of (x+${a})^${p}`, `${p}(x+${a})^${p-1}`]; }
    if(unitName === "Integrals") { const p=r(1,4); return [`∫ x^${p} dx`, `x^${p+1}/${p+1} + C`]; }
    return [`d/dx of x^3`, `3x^2`];
  }
  return [`2 + 3 = ?`, `5`];
}

let quizState = {};

function getUnitKey(s,i){ return `${s}::unit_${i}`; }
function getUnitStatus(s,i){ return progress[getUnitKey(s,i)] || null; }
function setUnitStatus(s,i,status){ progress[getUnitKey(s,i)] = status; saveProgressToLevel(progress); }
function isUnitComplete(s,i){ return getUnitStatus(s,i) === 'testPass'; }
function isUnlocked(s,i){ if(i===0) return true; return isUnitComplete(s,i-1); }
function getStarCount(s,i){ const st = getUnitStatus(s,i); if(st==='testPass') return 3; if(st==='practicePass') return 2; return 0; }
function isPracticePassed(s,i){ return getUnitStatus(s,i)==='practicePass' || getUnitStatus(s,i)==='testPass'; }

function resetAllProgress(){ if(confirm('Reset ALL progress for current level?')){ progress={}; saveProgressToLevel(progress); showMap(); updateStreakDisplay(); } }
function switchSubject(s){ currentSubject=s; localStorage.setItem('qx_current_subject', s); document.querySelectorAll('.subject-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().endsWith(s))); showMap(); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function generateWrongAnswers(correct, count=3){ const wrongs=[]; const isNum=/^-?\d+\.?\d*$/.test(String(correct)); while(wrongs.length<count){ if(isNum){ let n=parseFloat(correct); if(isNaN(n)) n=5; const delta=r(1,3)*(Math.random()<0.5?1:-1); let w=n+delta; if(w===n) w=n+1; if(w>0) wrongs.push(String(w)); else wrongs.push(String(n+2)); } else { wrongs.push(correct+'?'); } } return wrongs; }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function quitQuiz(){ showMap(); }

function startQuiz(idx, mode){
  const unit = curriculum[currentSubject][idx];
  if(mode==='test' && !isPracticePassed(currentSubject,idx) && getStarCount(currentSubject,idx) < 2){ alert("⚠️ You must pass Practice (70% or more) before attempting the Test!"); return; }
  const maxQ = mode === 'practice' ? 30 : 10;
  const passThreshold = 70;
  quizState = { idx, mode, unitName: unit.name, hearts: mode==='test'?3:999, correct:0, total:0, maxQ, passThreshold, questions:[], currentIndex:0 };
  for(let i=0; i<maxQ; i++){
    let difficulty = i < 10 ? 'easy' : (i < 20 ? 'medium' : 'hard');
    if(mode !== 'practice') difficulty = i < 3 ? 'easy' : (i < 7 ? 'medium' : 'hard');
    const [question, answer] = generateQuestionForGrade(currentSubject, unit.name, difficulty);
    quizState.questions.push({ question, answer, difficulty });
  }
  renderQuestion(); showScreen('quiz-screen');
}

function renderQuestion(){
  const qs = document.getElementById('quiz-screen');
  const { total, maxQ, questions, currentIndex, mode, hearts, unitName } = quizState;
  if(currentIndex >= maxQ){ showResult(); return; }
  const current = questions[currentIndex];
  const prog = Math.round((total/maxQ)*100);
  const opts = shuffle([current.answer, ...generateWrongAnswers(current.answer)]);
  const difficultyLabel = current.difficulty === 'easy' ? '🌱 EASY' : (current.difficulty === 'medium' ? '⚡ MEDIUM' : '🔥 HARD');
  const heartHTML = mode==='test' ? Array.from({length:3},(_,i)=>`<span class="heart${i>=hearts?' lost':''}">❤️</span>`).join('') : '';
  qs.innerHTML = `<div class="q-screen"><div class="quiz-header-actions"><div class="quiz-stats">Q${currentIndex+1}/${maxQ} • ${mode==='practice'?'Practice':'Test'}</div><button class="quit-quiz-btn" onclick="quitQuiz()">✕ Quit</button></div><div class="quiz-top"><div class="hearts">${heartHTML}</div><div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div></div><div class="q-card"><div class="difficulty-badge difficulty-${current.difficulty}">${difficultyLabel}</div><div class="q-topic">${unitName}</div><div class="q-text">${esc(current.question)}</div></div><div class="options" id="opts"></div><div class="feedback-bar" id="fb"></div><div id="expl-container"></div><button class="next-btn" id="next-btn" onclick="nextQ()">Continue →</button></div>`;
  const optDiv = document.getElementById('opts');
  const letters = ['A', 'B', 'C', 'D'];
  opts.forEach((opt, idx) => { const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span><span>${esc(opt)}</span>`; btn.onclick = () => checkAnswer(opt, btn); optDiv.appendChild(btn); });
  updateActiveOptions();
}

function checkAnswer(chosen, btn){
  const { questions, currentIndex, mode, unitName } = quizState;
  const current = questions[currentIndex];
  const isCorrect = chosen === current.answer;
  if(isCorrect){ btn.classList.add('correct'); quizState.correct++; } else { btn.classList.add('wrong'); document.querySelectorAll('.opt-btn').forEach(b=>{ if(b.querySelector('span:last-child')?.innerText.trim() === current.answer) b.classList.add('correct'); }); if(mode==='test'){ quizState.hearts--; } renderExplanation(unitName, current.question, current.answer, current.difficulty); }
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const fb = document.getElementById('fb');
  if(isCorrect){ fb.className='feedback-bar show correct'; fb.innerHTML=`<span class="fb-icon">✅</span><span class="fb-text correct">Correct!</span>`; } else { fb.className='feedback-bar show wrong'; fb.innerHTML=`<span class="fb-icon">✗</span><span class="fb-text wrong">Correct: ${esc(current.answer)}</span>`; }
  quizState.total++;
  document.getElementById('next-btn').classList.add('show');
  if(mode==='test' && quizState.hearts <= 0){ quizState.total = quizState.maxQ; document.getElementById('next-btn').click(); }
}

function nextQ(){ if(quizState.total >= quizState.maxQ || quizState.hearts <= 0){ showResult(); return; } quizState.currentIndex++; renderQuestion(); }

function showResult(){
  const { correct, maxQ, mode, passThreshold, idx } = quizState;
  const pct = Math.round((correct/maxQ)*100);
  const passed = pct >= passThreshold;
  const currentStatus = getUnitStatus(currentSubject, idx);
  let newStatus = currentStatus;
  let message = "";
  if(mode === 'practice' && passed && currentStatus !== 'testPass'){ newStatus = 'practicePass'; message = `🎉 Practice passed! ${correct}/${maxQ} (${pct}%). Test unlocked!`; recordStreakOnPass(); }
  else if(mode === 'test' && passed){ if(currentStatus !== 'testPass') newStatus = 'testPass'; message = `🏆 Test passed! ${correct}/${maxQ} (${pct}%). 3 stars!`; recordStreakOnPass(); }
  else if(mode === 'test' && !passed){ message = `❌ Test failed! ${pct}% needed ${passThreshold}%.`; }
  else if(mode === 'practice' && !passed){ message = `📚 Practice ${pct}% (need ${passThreshold}%).`; }
  if(newStatus !== currentStatus && newStatus){ setUnitStatus(currentSubject, idx, newStatus); }
  const starCount = getStarCount(currentSubject, idx);
  document.getElementById('result-screen').innerHTML = `<div class="result-screen-inner"><div class="result-icon">${starCount===3?'🌟':starCount===2?'⭐':'😅'}</div><div class="result-title">${starCount===3?'Perfect!':starCount===2?'Practice Passed':(mode==='test'?'Test Failed':'Practice Incomplete')}</div><div class="result-sub">${message || `${correct}/${maxQ} correct (${pct}%)`}</div><div class="result-stats"><div class="stat-card"><div class="stat-val">${correct}/${maxQ}</div><div class="stat-label">Correct</div></div><div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-label">Score</div></div></div><button class="result-btn" onclick="showMap()">Back to path</button></div>`;
  showScreen('result-screen');
}

function showMap(){
  const units = curriculum[currentSubject];
  const ms = document.getElementById('map-screen');
  ms.innerHTML = `<div class="map-header"><div class="map-title">${currentSubject}</div><div class="map-sub">⭐ Practice (30 Qs, 70%) → 2 stars | 🏆 Test (10 Qs, 70%) → 3 stars</div></div><div class="trail" id="trail"></div>`;
  const trail = document.getElementById('trail');
  units.forEach((unit,i)=>{
    const unlocked = isUnlocked(currentSubject,i);
    const starCount = getStarCount(currentSubject,i);
    let cls = starCount===3 ? 'perfect' : (starCount===2 ? 'complete' : (unlocked ? 'available' : 'locked'));
    const starsDisplay = starCount===3 ? '★★★' : (starCount===2 ? '★★☆' : '☆☆☆');
    const wrap = document.createElement('div'); wrap.className='checkpoint-wrap';
    if(i>0){ const c=document.createElement('div'); c.className='connector'+(isUnitComplete(currentSubject,i-1)?' done':''); wrap.appendChild(c); }
    const isClickable = unlocked || starCount > 0 || i === 0;
    wrap.innerHTML += `<button class="checkpoint-btn ${cls}" ${isClickable ? `onclick="openUnit(${i})"` : ''}><span>${unit.icon}</span>${starCount>0?`<span class="cp-stars">${starsDisplay}</span>`:''}</button><div class="cp-label">${unit.name}</div>`;
    trail.appendChild(wrap);
  });
  showScreen('map-screen');
  const oldPanel = document.getElementById('unit-panel'); if(oldPanel) oldPanel.remove();
  updateStreakDisplay();
}

function scrollToPanelSmoothly(){ const panel=document.getElementById('unit-panel'); if(panel){ panel.scrollIntoView({behavior:'smooth',block:'start'}); setTimeout(()=>{ if(panel) panel.style.boxShadow=''; },800); } }
function openUnit(idx){
  const unit = curriculum[currentSubject][idx];
  const practicePassed = isPracticePassed(currentSubject,idx);
  const testPassed = isUnitComplete(currentSubject,idx);
  const starCount = getStarCount(currentSubject,idx);
  const ms = document.getElementById('map-screen');
  const old = document.getElementById('unit-panel'); if(old) old.remove();
  const panel = document.createElement('div'); panel.id='unit-panel'; panel.className='unit-panel';
  let badgeHtml = `<div class="badge-container">${practicePassed?`<span class="status-badge practice-pass">✅ Practice Passed (2★)</span>`:`<span class="status-badge locked">📘 Practice needed (70%)</span>`}${testPassed?`<span class="status-badge test-pass">🏆 Test Passed (3★)</span>`:(practicePassed?`<span class="status-badge locked">🎯 Take Test (70%) for 3rd star</span>`:`<span class="status-badge locked">🔒 Test requires Practice first</span>`)}</div>`;
  let testDisabled = (!practicePassed && starCount === 0);
  panel.innerHTML = `<div class="unit-panel-title">${unit.icon} ${unit.name}</div><div class="unit-panel-sub">${testPassed?'⭐ Unit complete! Replay anytime!':(practicePassed?'✨ Practice passed! Take the test for 3rd star.':'📖 Complete practice (70%) to unlock test.')}</div>${badgeHtml}<div class="panel-actions"><button class="btn-practice" onclick="startQuiz(${idx},'practice')">📝 Practice (30 Qs • 70%)</button><button class="btn-test ${testDisabled?'disabled':''}" ${testDisabled?'disabled':`onclick="startQuiz(${idx},'test')"`}>🎯 Test (10 Qs • 70%)</button></div>${testPassed?'<div class="locked-message" style="color:var(--gold-dark);">★ 3 stars! Replay to keep skills sharp.</div>':(practicePassed?'<div class="locked-message">🎯 Pass test (70%) for final star!</div>':'<div class="locked-message">⚠️ Pass Practice first (70%) to unlock Test.</div>')}`;
  ms.appendChild(panel); scrollToPanelSmoothly();
}

// Streak & Keyboard functions
function updateStreakDisplay() { const sc = document.getElementById('streak-count'); if(sc) sc.textContent = getCurrentStreak(); }
function getCurrentStreak() {
  const last = localStorage.getItem('qx_streak_last_date');
  const streak = parseInt(localStorage.getItem('qx_streak') || '0');
  if(!last) return 0;
  const hoursDiff = (Date.now() - parseInt(last)) / (1000*60*60);
  if(hoursDiff > 48) return 0;
  return streak;
}
function recordStreakOnPass() {
  const now = Date.now();
  const last = localStorage.getItem('qx_streak_last_date');
  const current = parseInt(localStorage.getItem('qx_streak') || '0');
  if(!last) { localStorage.setItem('qx_streak', '1'); localStorage.setItem('qx_streak_last_date', now); }
  else {
    const hoursDiff = (now - parseInt(last)) / (1000*60*60);
    if(hoursDiff >= 24 && hoursDiff < 48) { localStorage.setItem('qx_streak', current+1); localStorage.setItem('qx_streak_last_date', now); }
    else if(hoursDiff < 24) { localStorage.setItem('qx_streak_last_date', now); }
    else if(hoursDiff >= 48) { localStorage.setItem('qx_streak', '1'); localStorage.setItem('qx_streak_last_date', now); }
  }
  updateStreakDisplay();
}

let currentActiveOptions = [];
function updateActiveOptions() { currentActiveOptions = Array.from(document.querySelectorAll('.opt-btn:not(:disabled)')); }
function selectAnswerByIndex(i) { updateActiveOptions(); if(currentActiveOptions[i] && !currentActiveOptions[i].disabled) currentActiveOptions[i].click(); }
function triggerContinue() { const btn = document.getElementById('next-btn'); if(btn && btn.classList.contains('show')) btn.click(); }
document.addEventListener('keydown', (e) => {
  const active = document.querySelector('.screen.active');
  if(active && active.id === 'quiz-screen') {
    if(e.key === '1') { e.preventDefault(); selectAnswerByIndex(0); }
    else if(e.key === '2') { e.preventDefault(); selectAnswerByIndex(1); }
    else if(e.key === '3') { e.preventDefault(); selectAnswerByIndex(2); }
    else if(e.key === '4') { e.preventDefault(); selectAnswerByIndex(3); }
    else if(e.key === 'a' || e.key === 'A') { e.preventDefault(); selectAnswerByIndex(0); }
    else if(e.key === 'b' || e.key === 'B') { e.preventDefault(); selectAnswerByIndex(1); }
    else if(e.key === 'c' || e.key === 'C') { e.preventDefault(); selectAnswerByIndex(2); }
    else if(e.key === 'd' || e.key === 'D') { e.preventDefault(); selectAnswerByIndex(3); }
    else if(e.key === 'Enter') { e.preventDefault(); triggerContinue(); }
    else if(e.key === 'Escape') { e.preventDefault(); const qb = document.querySelector('.quit-quiz-btn'); if(qb) qb.click(); else showMap(); }
  }
});

window.addEventListener('load', () => { if(!currentLevel) showLevelSelector(); else { rebuildSidebar(); showMap(); updateStreakDisplay(); } });
</script>
