<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quick Quiz | Daily Streak</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        .quiz-card {
            background: #fef9f0;
            border-radius: 44px;
            padding: 28px 24px 32px 24px;
            max-width: 620px;
            width: 100%;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #1e4b6e, #2a6f5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .streak-badge {
            background: #ffedd5;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            margin-bottom: 20px;
            border: 1px solid #f3c26b;
        }

        .streak-icon {
            font-size: 1.5rem;
        }

        .streak-count {
            font-weight: 800;
            font-size: 1.4rem;
            color: #b45309;
        }

        .streak-label {
            font-weight: 600;
            color: #92400e;
            font-size: 0.85rem;
        }

        .question {
            font-size: 1.6rem;
            font-weight: 600;
            background: #eef2ff;
            padding: 16px 12px;
            border-radius: 48px;
            margin: 12px 0 20px 0;
            color: #0c4e6e;
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin: 24px 0 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #cfdfe8;
            border-radius: 80px;
            padding: 14px 28px;
            min-width: 100px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f4e6e;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        .option-btn:hover {
            background: #e6f4ff;
            transform: scale(0.97);
        }

        .feedback {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 12px 0 16px;
            padding: 10px;
            border-radius: 50px;
            background: #f3f4f6;
            min-height: 68px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin: 8px 0 10px;
        }

        .primary-btn {
            background: #2c7a5e;
            border: none;
            color: white;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
        }

        .primary-btn:hover {
            background: #1f5e48;
        }

        .secondary-btn {
            background: #4b5563;
            border: none;
            color: white;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
        }

        .status {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #4b5563;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .key-hint {
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-card">
        <h1>📋 Select an Option</h1>

        <div class="streak-badge">
            <span class="streak-icon">🔥</span>
            <span class="streak-count" id="streakValue">0</span>
            <span class="streak-label">day streak</span>
        </div>

        <div class="question">Choose one:</div>

        <div class="options-grid" id="optionsContainer"></div>

        <div class="feedback" id="feedbackMsg">✨ Press 1,2,3,4 or click an option ✨</div>

        <div class="action-buttons">
            <button class="primary-btn" id="submitBtn">⏎ Enter / Submit / Continue</button>
            <button class="secondary-btn" id="quitBtn">⎋ Esc / Quit quiz</button>
        </div>

        <div class="status">
            <span>🔢 1=A &nbsp; 2=B &nbsp; 3=C &nbsp; 4=D</span>
            <span class="key-hint">⏎ Submit &nbsp;&nbsp; ⎋ Quit</span>
        </div>
    </div>
</div>

<script>
    // Options: 1 = A, 2 = B, 3 = C, 4 = D
    const OPTIONS = [
        { value: 1, label: "1", meaning: "A" },
        { value: 2, label: "2", meaning: "B" },
        { value: 3, label: "3", meaning: "C" },
        { value: 4, label: "4", meaning: "D" }
    ];

    let selectedValue = null;
    let currentButtons = [];

    // DOM elements
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const submitBtn = document.getElementById('submitBtn');
    const quitBtn = document.getElementById('quitBtn');
    const streakValueSpan = document.getElementById('streakValue');

    // ---------- DAILY STREAK (24hrs since last login) ----------
    const STREAK_KEY = 'quiz_streak_data';

    function getStreakData() {
        const defaultData = { lastLoginTimestamp: 0, streakCount: 0 };
        const raw = localStorage.getItem(STREAK_KEY);
        if (!raw) return defaultData;
        try {
            return JSON.parse(raw);
        } catch(e) {
            return defaultData;
        }
    }

    function saveStreakData(data) {
        localStorage.setItem(STREAK_KEY, JSON.stringify(data));
    }

    function updateDailyStreak() {
        const now = Date.now();
        const data = getStreakData();
        let { lastLoginTimestamp, streakCount } = data;
        const MILLIS_24H = 24 * 60 * 60 * 1000;

        let newStreak = streakCount;

        if (lastLoginTimestamp === 0) {
            newStreak = 1;
        } else {
            const diff = now - lastLoginTimestamp;
            if (diff >= MILLIS_24H && diff < 2 * MILLIS_24H) {
                newStreak = streakCount + 1;
            } else if (diff >= 2 * MILLIS_24H) {
                newStreak = 1;
            } else {
                newStreak = streakCount;
            }
        }

        saveStreakData({ lastLoginTimestamp: now, streakCount: newStreak });
        streakValueSpan.innerText = newStreak;
        return newStreak;
    }

    // ---------- RENDER OPTIONS (1,2,3,4) ----------
    function renderOptions() {
        optionsContainer.innerHTML = '';
        const buttons = [];
        OPTIONS.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = `${opt.label}  →  ${opt.meaning}`;
            btn.setAttribute('data-value', opt.value);
            btn.addEventListener('click', () => {
                // reset all styles
                currentButtons.forEach(b => {
                    b.style.background = 'white';
                    b.style.borderColor = '#cfdfe8';
                });
                selectedValue = opt.value;
                btn.style.background = '#c7e9fb';
                btn.style.borderColor = '#2c7a5e';
                feedbackMsg.innerHTML = `✅ Selected: ${opt.label} (${opt.meaning}). Press Enter / Submit to continue.`;
            });
            optionsContainer.appendChild(btn);
            buttons.push(btn);
        });
        currentButtons = buttons;
        selectedValue = null;
    }

    // Submit / Continue
    function handleSubmit() {
        if (selectedValue === null) {
            feedbackMsg.innerHTML = '⚠️ Please select 1, 2, 3, or 4 first.';
            return;
        }
        const selectedOpt = OPTIONS.find(o => o.value === selectedValue);
        feedbackMsg.innerHTML = `🚀 You chose ${selectedOpt.label} (${selectedOpt.meaning}). Submitted! (Continue action would go here)`;
        // Optional: you could trigger a next step here, but keeping exactly as requested.
    }

    // Quit quiz (reset selection, clear feedback)
    function quitQuiz() {
        selectedValue = null;
        currentButtons.forEach(btn => {
            btn.style.background = 'white';
            btn.style.borderColor = '#cfdfe8';
        });
        feedbackMsg.innerHTML = '✨ Quiz quit. Select 1,2,3,4 to start again. ✨';
    }

    // Keyboard: 1,2,3,4 keys select options
    function handleKeydown(e) {
        const key = e.key;
        if (key === 'Enter') {
            e.preventDefault();
            handleSubmit();
        } else if (key === 'Escape') {
            e.preventDefault();
            quitQuiz();
        } else if (key === '1') {
            e.preventDefault();
            simulateSelect(1);
        } else if (key === '2') {
            e.preventDefault();
            simulateSelect(2);
        } else if (key === '3') {
            e.preventDefault();
            simulateSelect(3);
        } else if (key === '4') {
            e.preventDefault();
            simulateSelect(4);
        }
    }

    function simulateSelect(val) {
        const btnIndex = OPTIONS.findIndex(o => o.value === val);
        if (btnIndex !== -1 && currentButtons[btnIndex]) {
            currentButtons.forEach(b => {
                b.style.background = 'white';
                b.style.borderColor = '#cfdfe8';
            });
            selectedValue = val;
            currentButtons[btnIndex].style.background = '#c7e9fb';
            currentButtons[btnIndex].style.borderColor = '#2c7a5e';
            const opt = OPTIONS[btnIndex];
            feedbackMsg.innerHTML = `✅ Selected: ${opt.label} (${opt.meaning}). Press Enter / Submit to continue.`;
        }
    }

    // Initialize
    renderOptions();
    submitBtn.addEventListener('click', handleSubmit);
    quitBtn.addEventListener('click', quitQuiz);
    window.addEventListener('keydown', handleKeydown);
    updateDailyStreak();
</script>
</body>
</html>
