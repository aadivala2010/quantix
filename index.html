<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantix – Math Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#58cc02;--green-dark:#3a8f00;--green-deeper:#2a6e00;
  --red:#ff4b4b;--red-bg:#fff0f0;
  --correct-bg:#f0fff0;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdafe;
  --gold:#f59e0b;--gold-dark:#b45309;
  --bg:#f0f4f0;--surface:#fff;--surface2:#f7f9f7;
  --text:#1a2e1a;--text2:#4a6349;--text3:#7a9479;
  --border:#dde8dd;--radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --font:'Nunito',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--green);display:flex;flex-direction:column;padding:20px 14px;gap:6px;flex-shrink:0;position:sticky;top:0;height:100vh}
.logo{color:#fff;font-size:22px;font-weight:800;letter-spacing:-0.5px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.25);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.subject-btn{background:rgba(255,255,255,0.12);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:700;font-family:var(--font);padding:10px 12px;cursor:pointer;text-align:left;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.subject-btn:hover{background:rgba(255,255,255,0.25)}
.subject-btn.active{background:rgba(255,255,255,0.95);color:var(--green-dark)}
.sidebar-spacer{flex:1}
.reset-btn{background:rgba(0,0,0,0.15);border:none;border-radius:var(--radius-sm);color:rgba(255,255,255,0.85);font-size:12px;font-weight:700;font-family:var(--font);padding:9px 12px;cursor:pointer;transition:background 0.15s}
.reset-btn:hover{background:rgba(0,0,0,0.25)}
.main{flex:1;padding:32px 28px;overflow-y:auto}
.screen{display:none}
.screen.active{display:block}
.map-header{margin-bottom:28px}
.map-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.map-sub{font-size:14px;color:var(--text2);margin-top:4px}
.trail{display:flex;flex-direction:column;align-items:center;gap:0;max-width:280px;margin:0 auto}
.checkpoint-wrap{display:flex;flex-direction:column;align-items:center}
.connector{width:4px;height:28px;background:var(--border);border-radius:2px}
.connector.done{background:var(--green)}
.checkpoint-btn{width:76px;height:76px;border-radius:50%;border:4px solid transparent;font-size:24px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-family:var(--font)}
.checkpoint-btn.locked{background:#e8ede8;border-color:#c8d4c8;cursor:not-allowed;opacity:0.7}
.checkpoint-btn.available{background:var(--surface);border-color:var(--green);box-shadow:0 5px 0 var(--green-dark)}
.checkpoint-btn.available:hover{transform:translateY(-3px);box-shadow:0 8px 0 var(--green-dark)}
.checkpoint-btn.available:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-dark)}
.checkpoint-btn.complete{background:var(--green);border-color:var(--green-dark);box-shadow:0 5px 0 var(--green-deeper);color:#fff}
.checkpoint-btn.perfect{background:var(--gold);border-color:var(--gold-dark);box-shadow:0 5px 0 #92400e}
.cp-stars{font-size:10px;line-height:1}
.cp-label{font-size:11px;font-weight:700;color:var(--text2);margin-top:6px;text-align:center;max-width:90px;line-height:1.3}
.unit-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:20px;max-width:360px;margin-left:auto;margin-right:auto;box-shadow:var(--shadow)}
.unit-panel-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px}
.unit-panel-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.panel-actions{display:flex;gap:10px}
.btn-practice{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 18px;font-size:14px;font-weight:800;font-family:var(--font);cursor:pointer;flex:1;border-bottom:4px solid var(--green-dark);transition:all 0.1s}
.btn-practice:active{border-bottom-width:1px;transform:translateY(3px)}
.btn-test{background:var(--surface);color:var(--green);border:2px solid var(--green);border-radius:var(--radius-sm);padding:12px 18px;font-size:14px;font-weight:800;font-family:var(--font);cursor:pointer;flex:1;transition:background 0.1s}
.btn-test:hover{background:var(--correct-bg)}
.q-screen{max-width:540px;margin:0 auto}
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.hearts{display:flex;gap:4px}
.heart{font-size:22px}
.heart.lost{filter:grayscale(1);opacity:0.35}
.progress-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:13px;overflow:hidden}
.progress-bar{height:100%;background:var(--green);border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.q-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:18px;box-shadow:var(--shadow)}
.q-topic{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.q-text{font-size:21px;font-weight:800;color:var(--text);line-height:1.4;text-align:center;font-family:var(--mono)}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:15px 20px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;text-align:left;color:var(--text);transition:all 0.12s;display:flex;align-items:center;gap:12px;box-shadow:0 2px 0 var(--border)}
.opt-btn:hover:not(:disabled){border-color:var(--green);background:var(--correct-bg);box-shadow:0 2px 0 var(--green)}
.opt-btn.correct{border-color:var(--green);background:var(--correct-bg);color:var(--green-dark);box-shadow:0 2px 0 var(--green)}
.opt-btn.wrong{border-color:var(--red);background:var(--red-bg);color:#b00;box-shadow:0 2px 0 var(--red)}
.opt-btn:disabled{cursor:not-allowed}
.opt-letter{width:30px;height:30px;border-radius:7px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text2);flex-shrink:0}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff;border-color:var(--green-dark)}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff;border-color:#c00}
.feedback-bar{border-radius:var(--radius-sm);padding:14px 18px;margin-top:14px;display:none;align-items:center;gap:12px}
.feedback-bar.show{display:flex}
.feedback-bar.correct{background:#d7ffb8;border:1.5px solid var(--green)}
.feedback-bar.wrong{background:var(--red-bg);border:1.5px solid var(--red)}
.fb-icon{font-size:20px}
.fb-text{font-size:15px;font-weight:800}
.fb-text.correct{color:var(--green-dark)}
.fb-text.wrong{color:#b00}
.next-btn{display:none;margin-top:14px;width:100%;background:var(--green);color:#fff;border:none;border-bottom:4px solid var(--green-dark);border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all 0.1s}
.next-btn:active{border-bottom-width:1px;transform:translateY(3px)}
.next-btn.show{display:block}
/* Explanation */
.expl-panel{margin-top:14px;border-radius:var(--radius-sm);border:1.5px solid var(--blue-border);background:var(--blue-bg);overflow:hidden;animation:slideIn 0.3s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.expl-header{display:flex;align-items:center;gap:8px;padding:11px 16px;background:rgba(37,99,235,0.08);border-bottom:1px solid var(--blue-border)}
.expl-badge{font-size:12px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em}
.expl-body{padding:14px 16px;font-size:14px;line-height:1.7;color:#1e3a5f}
.step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step-num{min-width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{flex:1;padding-top:3px}
.math{font-family:var(--mono);font-size:13px;background:rgba(37,99,235,0.1);border-radius:5px;padding:2px 7px;display:inline-block;margin:3px 0}
.expl-tip{margin-top:10px;padding:10px 14px;background:rgba(37,99,235,0.08);border-radius:var(--radius-sm);border-left:3px solid var(--blue);font-size:13px;color:#1e3a5f;font-weight:600}
/* Result */
.result-screen-inner{text-align:center;padding:40px 20px;max-width:420px;margin:0 auto}
.result-icon{font-size:68px;margin-bottom:16px}
.result-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px}
.result-sub{font-size:15px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 22px;min-width:100px;box-shadow:var(--shadow)}
.stat-val{font-size:24px;font-weight:800;color:var(--text)}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;font-weight:600}
.result-btn{background:var(--green);color:#fff;border:none;border-bottom:4px solid var(--green-dark);border-radius:var(--radius-sm);padding:14px 36px;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer}
/* Quit button inside quiz */
.quit-quiz-btn{background:var(--surface);color:var(--red);border:2px solid var(--red);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all 0.1s;margin-left:auto;display:flex;align-items:center;gap:6px}
.quit-quiz-btn:hover{background:var(--red-bg);transform:scale(0.98)}
.quiz-header-actions{display:flex;align-items:center;gap:12px;margin-bottom:12px;justify-content:space-between}
/* Subject selection overlay */
.subject-selector-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease}
.subject-selector-card{background:var(--surface);border-radius:28px;padding:32px 28px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 35px rgba(0,0,0,0.2);border:2px solid var(--green)}
.subject-selector-card h2{font-size:28px;font-weight:800;color:var(--text);margin-bottom:8px}
.subject-selector-card p{color:var(--text2);margin-bottom:28px;font-size:14px}
.subject-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.subject-choice-btn{background:var(--surface2);border:2px solid var(--border);border-radius:60px;padding:16px;font-size:18px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:12px}
.subject-choice-btn:hover{background:var(--correct-bg);border-color:var(--green);transform:scale(1.02)}
.subject-choice-btn:active{transform:scale(0.98)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:700px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;padding:10px;gap:4px;position:static}
  .logo{display:none}
  .subject-btn{font-size:11px;padding:8px 10px;white-space:nowrap;flex:0 0 auto}
  .reset-btn{flex:0 0 auto;font-size:11px;padding:8px 10px;margin-left:auto}
  .main{padding:16px 12px}
  .q-text{font-size:17px}
  .opt-btn{font-size:13px;padding:12px 14px}
  .quit-quiz-btn{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo"><div class="logo-mark">Q</div>Quantix</div>
    <button class="subject-btn active" onclick="switchSubject('Algebra 1')"><span>📐</span>Algebra 1</button>
    <button class="subject-btn" onclick="switchSubject('Algebra 2')"><span>📊</span>Algebra 2</button>
    <button class="subject-btn" onclick="switchSubject('Geometry')"><span>🔺</span>Geometry</button>
    <button class="subject-btn" onclick="switchSubject('Pre-Calc')"><span>📡</span>Pre-Calc</button>
    <button class="subject-btn" onclick="switchSubject('Calculus')"><span>∫</span>Calculus</button>
    <div class="sidebar-spacer"></div>
    <button class="reset-btn" onclick="resetAllProgress()">🗑 Reset Progress</button>
  </div>
  <div class="main">
    <div id="map-screen" class="screen active"></div>
    <div id="quiz-screen" class="screen"></div>
    <div id="result-screen" class="screen"></div>
  </div>
</div>
<script>
// ── Built-in step-by-step explainers (same as original, compact) ──
function fallback(q,a){return{steps:[{text:"Question:",math:q},{text:"Answer:",math:a}],tip:"Review concept."};}
const explainers={
  "Linear Equations":(q,a)=>{const m=q.match(/^(\d+)x \+ (\d+) = (\d+)$/);if(!m)return fallback(q,a);const[,av,b,c]=m.map(Number);return{steps:[{text:"Equation:",math:`${av}x + ${b} = ${c}`},{text:`Subtract ${b}:`,math:`${av}x = ${c-b}`},{text:`Divide by ${av}:`,math:`x = ${a}`}],tip:"Isolate x step by step."};},
  "Quadratics":(q,a)=>{const m=q.match(/x² = (\d+)/);if(!m)return fallback(q,a);return{steps:[{text:"Start:",math:`x² = ${m[1]}`},{text:"Square root:",math:`x = √${m[1]}`},{text:"Result:",math:`x = ${a}`}],tip:"√(x²)=x"};},
  "Factoring":(q,a)=>{const m=q.match(/Factor x² \+ (\d+)x \+ (\d+)/);if(!m)return fallback(q,a);return{steps:[{text:"Find numbers multiply to",math:m[2]},{text:"Add to",math:m[1]},{text:"Factor form:",math:a}],tip:"Find pair that multiplies to c and adds to b."};},
  "Inequalities":(q,a)=>{const m=q.match(/2x > (\d+)/);if(!m)return fallback(q,a);return{steps:[{text:`2x > ${m[1]}`},{text:"Divide by 2:",math:`x > ${m[1]/2}`}],tip:"Positive divisor keeps sign."};},
  "Functions":(q,a)=>{const m=q.match(/f\(x\) = 2x \+ 3\.\s*Find f\((\d+)\)/);if(!m)return fallback(q,a);const x=Number(m[1]);return{steps:[{text:"f(x)=2x+3"},{text:`f(${x})=2*${x}+3`},{text:`=${a}`}],tip:"Substitute and simplify."};},
  "Complex Quadratics":(q,a)=>{const m=q.match(/Solve x² - (\d+)x \+ (\d+) = 0/);if(!m)return fallback(q,a);return{steps:[{text:"Factor the quadratic"},{text:"Zero product property"},{text:`Solutions: ${a}`}],tip:"Find numbers that multiply to c and sum to b."};},
  "Polynomials":(q,a)=>explainers["Factoring"](q,a),
  "Exponents":(q,a)=>{const m=q.match(/2\^(\d+)/);if(!m)return fallback(q,a);return{steps:[{text:`2^${m[1]} = multiply`},{text:`= ${a}`}],tip:"Exponent = repeated multiplication."};},
  "Logarithms":(q,a)=>{const m=q.match(/log₂\(2\^(\d+)\)/);if(!m)return fallback(q,a);return{steps:[{text:"log₂(2ⁿ)=n"},{text:`= ${m[1]}`}],tip:"Base and argument match."};},
  "Rational Functions":(q,a)=>fallback(q,a),
  "Area":(q,a)=>{const m=q.match(/side (\d+)/);if(!m)return fallback(q,a);return{steps:[{text:"Area = side²"},{text:`${m[1]}² = ${a}`}],tip:"Square side length."};},
  "Perimeter":(q,a)=>{const m=q.match(/side (\d+)/);if(!m)return fallback(q,a);return{steps:[{text:"Perimeter = 4×side"},{text:`4×${m[1]} = ${a}`}],tip:"Square has 4 equal sides."};},
  "Angles":(q,a)=>{const m=q.match(/angles (\d+)° and 60°/);if(!m)return fallback(q,a);const av=Number(m[1]);return{steps:[{text:"Triangle sum 180°"},{text:`180-${av}-60 = ${a}`}],tip:"Add known angles, subtract from 180."};},
  "Triangles":(q,a)=>{const m=q.match(/base (\d+), height (\d+)/);if(!m)return fallback(q,a);return{steps:[{text:"Area = ½×base×height"},{text:`½×${m[1]}×${m[2]} = ${a}`}],tip:"Half base times height."};},
  "Circles":(q,a)=>{const m=q.match(/radius (\d+)/);if(!m)return fallback(q,a);const r=Number(m[1]);return{steps:[{text:"Area = πr²"},{text:`3.14×${r}² ≈ ${a}`}],tip:"Square radius first."};},
  "Trig Basics":(q,a)=>({steps:[{text:"Unit circle value:",math:q},{text:`= ${a}`}],tip:"Memorize key angles."}),
  "Sequences":(q,a)=>{const m=q.match(/1 \+ 2 \+ \.\.\. \+ (\d+)/);if(!m)return fallback(q,a);const n=Number(m[1]);return{steps:[{text:"Sum = n(n+1)/2"},{text:`${n}×${n+1}/2 = ${a}`}],tip:"Gauss formula."};},
  "Advanced Functions":(q,a)=>{const m=q.match(/f\(x\) = x² \+ 2\.\s*Find f\((\d+)\)/);if(!m)return fallback(q,a);const x=Number(m[1]);return{steps:[{text:`f(${x}) = ${x}²+2`},{text:`=${x*x}+2 = ${a}`}],tip:"Square then add."};},
  "Exponentials":(q,a)=>{const m=q.match(/3\^(\d+)/);if(!m)return fallback(q,a);return{steps:[{text:`3^${m[1]} = ${a}`}],tip:"Multiply 3 repeatedly."};},
  "Polar Coords":(q,a)=>{const m=q.match(/\((\d+),0\)/);if(!m)return fallback(q,a);return{steps:[{text:`r = ${m[1]}, θ=0°`},{text:`(${m[1]}, 0°)`}],tip:"Point on x-axis."};},
  "Limits":(q,a)=>{const m=q.match(/lim x→(\d+) of \(x \+ (\d+)\)/);if(!m)return fallback(q,a);return{steps:[{text:"Direct substitution"},{text:`= ${a}`}],tip:"Plug in x value."};},
  "Derivatives":(q,a)=>{const m=q.match(/d\/dx of x\^(\d+)/);if(!m)return fallback(q,a);const p=Number(m[1]);return{steps:[{text:"Power rule: nxⁿ⁻¹"},{text:`${p}x^${p-1}`}],tip:"Multiply exponent, subtract 1."};},
  "Chain Rule":(q,a)=>({steps:[{text:"Outer derivative × inner derivative"},{text:`${a}`}],tip:"Chain rule: f'(g(x))·g'(x)."}),
  "Integrals":(q,a)=>{const m=q.match(/∫ x\^(\d+) dx/);if(!m)return fallback(q,a);const p=Number(m[1]);return{steps:[{text:`∫ x^${p} dx = x^${p+1}/${p+1}+C`}],tip:"Add 1 to power, divide."};},
  "Applications":(q,a)=>fallback(q,a)
};
function getExplanation(unitName,q,a){const fn=explainers[unitName];if(!fn)return fallback(q,a);try{return fn(q,a);}catch(e){return fallback(q,a);}}
function renderExplanation(unitName,q,a){const container=document.getElementById('expl-container');if(!container)return;const data=getExplanation(unitName,q,a);const stepsHtml=data.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${esc(s.text)}${s.math?`<div class="math">${esc(s.math)}</div>`:''}</div></div>`).join('');const tipHtml=data.tip?`<div class="expl-tip">💡 ${esc(data.tip)}</div>`:'';container.innerHTML=`<div class="expl-panel"><div class="expl-header"><span>🧠</span><span class="expl-badge">Step-by-step solution</span></div><div class="expl-body">${stepsHtml}${tipHtml}</div></div>`;}
// Curriculum data
const curriculum={
  "Algebra 1":[{name:"Linear Equations",icon:"📐",gen:()=>{const a=r(1,10),b=r(0,10),x=r(1,10);return[`${a}x + ${b} = ${a*x+b}`,`${x}`]}},{name:"Quadratics",icon:"📈",gen:()=>{const x=r(1,9);return[`x² = ${x*x}`,`${x}`]}},{name:"Factoring",icon:"🔢",gen:()=>{const a=r(1,5),b=r(1,5);return[`Factor x² + ${a+b}x + ${a*b}`,`(x+${a})(x+${b})`]}},{name:"Inequalities",icon:"⚖️",gen:()=>{const b=r(2,20);return[`2x > ${b}`,`x > ${b/2}`]}},{name:"Functions",icon:"🎯",gen:()=>{const x=r(1,10);return[`f(x) = 2x + 3. Find f(${x})`,`${2*x+3}`]}}],
  "Algebra 2":[{name:"Complex Quadratics",icon:"📊",gen:()=>{const a=r(1,5),b=r(1,5);return[`Solve x² - ${a+b}x + ${a*b} = 0`,`x=${a}, x=${b}`]}},{name:"Polynomials",icon:"🌊",gen:()=>{const a=r(1,5),b=r(1,5);return[`Factor x² + ${a+b}x + ${a*b}`,`(x+${a})(x+${b})`]}},{name:"Exponents",icon:"⚡",gen:()=>{const x=r(1,5);return[`2^${x} = ?`,`${Math.pow(2,x)}`]}},{name:"Logarithms",icon:"🔬",gen:()=>{const x=r(2,8);return[`log₂(2^${x}) = ?`,`${x}`]}},{name:"Rational Functions",icon:"🔄",gen:()=>{const a=r(1,5),b=r(1,10);return[`f(x) = x + ${a}. Find f(${b})`,`${b+a}`]}}],
  "Geometry":[{name:"Area",icon:"🟦",gen:()=>{const s=r(2,10);return[`Area of square with side ${s}?`,`${s*s}`]}},{name:"Perimeter",icon:"📏",gen:()=>{const s=r(2,10);return[`Perimeter of square with side ${s}?`,`${4*s}`]}},{name:"Angles",icon:"📐",gen:()=>{const a=r(30,80);return[`A triangle has angles ${a}° and 60°. Find the third angle.`,`${180-a-60}°`]}},{name:"Triangles",icon:"🔺",gen:()=>{const b=r(2,12),h=r(2,10);return[`Triangle base ${b}, height ${h}. Area?`,`${b*h/2}`]}},{name:"Circles",icon:"⭕",gen:()=>{const rr=r(2,8);return[`Circle radius ${rr}. Area? (use π≈3.14)`,`${Math.round(3.14*rr*rr)}`]}}],
  "Pre-Calc":[{name:"Trig Basics",icon:"📡",gen:()=>[["sin(90°)","1"],["cos(0°)","1"],["tan(45°)","1"],["sin(0°)","0"],["cos(90°)","0"]][r(0,4)]},{name:"Sequences",icon:"🔗",gen:()=>{const n=r(2,8);return[`1 + 2 + ... + ${n} = ?`,`${n*(n+1)/2}`]}},{name:"Advanced Functions",icon:"🎢",gen:()=>{const x=r(1,10);return[`f(x) = x² + 2. Find f(${x})`,`${x*x+2}`]}},{name:"Exponentials",icon:"🚀",gen:()=>{const x=r(1,6);return[`3^${x} = ?`,`${Math.pow(3,x)}`]}},{name:"Polar Coords",icon:"🧭",gen:()=>{const a=r(1,5);return[`Convert (${a},0) to polar form`,`(${a}, 0°)`]}}],
  "Calculus":[{name:"Limits",icon:"🎯",gen:()=>{const a=r(1,5),b=r(1,10);return[`lim x→${a} of (x + ${b})`,`${a+b}`]}},{name:"Derivatives",icon:"📉",gen:()=>{const p=r(2,6);return[`d/dx of x^${p} = ?`,`${p}x^${p-1}`]}},{name:"Chain Rule",icon:"⛓️",gen:()=>{const a=r(1,5),p=r(2,4);return[`d/dx of (x+${a})^${p}`,`${p}(x+${a})^${p-1}`]}},{name:"Integrals",icon:"∫",gen:()=>{const p=r(1,4);return[`∫ x^${p} dx = ?`,`x^${p+1}/${p+1} + C`]}},{name:"Applications",icon:"🏗️",gen:()=>{const x=r(1,6);return[`y = x². What is dy/dx at x = ${x}?`,`${2*x}`]}}]
};
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let progress=JSON.parse(localStorage.getItem('qx_v2')||'{}');
let currentSubject='Algebra 1';
let quizState={};
function saveProgress(){try{localStorage.setItem('qx_v2',JSON.stringify(progress))}catch(e){}}
function getKey(s,i){return s+'::'+i}
function isUnlocked(s,i){return i===0||!!progress[getKey(s,i-1)]}
function isComplete(s,i){return!!progress[getKey(s,i)]}
function isPerfect(s,i){return progress[getKey(s,i)]==='perfect'}
function resetAllProgress(){if(confirm('Reset ALL progress?')){progress={};localStorage.removeItem('qx_v2');saveProgress();showMap();const p=document.getElementById('unit-panel');if(p)p.remove();}}
function switchSubject(s){currentSubject=s;document.querySelectorAll('.subject-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().endsWith(s)));showMap();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showMap(){const units=curriculum[currentSubject];const ms=document.getElementById('map-screen');ms.innerHTML=`<div class="map-header"><div class="map-title">${currentSubject}</div><div class="map-sub">Complete each unit to unlock the next</div></div><div class="trail" id="trail"></div>`;const trail=document.getElementById('trail');units.forEach((unit,i)=>{const unlocked=isUnlocked(currentSubject,i),complete=isComplete(currentSubject,i),perfect=isPerfect(currentSubject,i);let cls='locked';if(perfect)cls='perfect';else if(complete)cls='complete';else if(unlocked)cls='available';const stars=perfect?'★★★':complete?'★★☆':'';const wrap=document.createElement('div');wrap.className='checkpoint-wrap';if(i>0){const c=document.createElement('div');c.className='connector'+(isComplete(currentSubject,i-1)?' done':'');wrap.appendChild(c);}wrap.innerHTML+=`<button class="checkpoint-btn ${cls}" ${unlocked?`onclick="openUnit(${i})"`:''}><span>${unit.icon}</span>${stars?`<span class="cp-stars">${stars}</span>`:''}</button><div class="cp-label">${unit.name}</div>`;trail.appendChild(wrap);});showScreen('map-screen');}
function scrollToPanelSmoothly(){const panel=document.getElementById('unit-panel');if(panel){panel.scrollIntoView({behavior:'smooth',block:'start'});panel.style.transition='box-shadow 0.2s';panel.style.boxShadow='0 0 0 3px var(--green), 0 4px 20px rgba(88,204,2,0.3)';setTimeout(()=>{if(panel)panel.style.boxShadow='';},800);}}
function openUnit(idx){const unit=curriculum[currentSubject][idx],complete=isComplete(currentSubject,idx);const ms=document.getElementById('map-screen');const old=document.getElementById('unit-panel');if(old)old.remove();const panel=document.createElement('div');panel.id='unit-panel';panel.className='unit-panel';panel.innerHTML=`<div class="unit-panel-title">${unit.icon} ${unit.name}</div><div class="unit-panel-sub">${complete?'Completed! Practice again to earn perfect stars.':'Finish this unit to unlock the next one.'}</div><div class="panel-actions"><button class="btn-practice" onclick="startQuiz(${idx},'practice')">Practice</button><button class="btn-test" onclick="startQuiz(${idx},'test')">Test (5 Qs)</button></div>`;ms.appendChild(panel);scrollToPanelSmoothly();}
function generateWrongAnswers(correct,count=3){const wrongs=[];const isNum=/^-?\d+\.?\d*$/.test(correct);while(wrongs.length<count){let w;if(isNum){const n=parseFloat(correct),delta=r(1,5)*(Math.random()<.5?1:-1);w=String(n+delta);if(w===correct||wrongs.includes(w)||w==='0')continue;}else{const v=[correct+'²',correct.replace(/\d+/,m=>String(parseInt(m)+r(1,3))),'2'+correct,'None of these'];w=v[r(0,v.length-1)];if(w===correct||wrongs.includes(w))continue;}wrongs.push(w);}return wrongs;}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function quitQuiz(){showMap();}
function startQuiz(idx,mode){const unit=curriculum[currentSubject][idx];quizState={idx,mode,unitName:unit.name,hearts:mode==='test'?3:999,correct:0,total:0,maxQ:mode==='test'?5:10,gen:unit.gen};renderQuestion();showScreen('quiz-screen');}
function renderQuestion(){const qs=document.getElementById('quiz-screen');const{hearts,total,maxQ,gen,mode,unitName}=quizState;const prog=Math.round((total/maxQ)*100);const[question,answer]=gen();quizState.currentQ=question;quizState.currentA=answer;const opts=shuffle([answer,...generateWrongAnswers(answer)]);const heartHTML=mode==='test'?Array.from({length:3},(_,i)=>`<span class="heart${i>=hearts?' lost':''}">❤️</span>`).join(''):'';qs.innerHTML=`<div class="q-screen"><div class="quiz-header-actions"><div class="hearts">${heartHTML}</div><button class="quit-quiz-btn" onclick="quitQuiz()">✕ Quit & Exit</button></div><div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div><div class="q-card"><div class="q-topic">${unitName}</div><div class="q-text">${esc(question)}</div></div><div class="options" id="opts"></div><div class="feedback-bar" id="fb"></div><div id="expl-container"></div><button class="next-btn" id="next-btn" onclick="nextQ()">Continue →</button></div>`;const optDiv=document.getElementById('opts');opts.forEach((opt,i)=>{const letters=['A','B','C','D'];const b=document.createElement('button');b.className='opt-btn';b.innerHTML=`<span class="opt-letter">${letters[i]}</span>${esc(opt)}`;b.onclick=()=>checkAnswer(opt,b);optDiv.appendChild(b);});}
function checkAnswer(chosen,btn){const{currentA,currentQ,mode,unitName}=quizState;const isCorrect=chosen===currentA;document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);const fb=document.getElementById('fb'),nb=document.getElementById('next-btn');if(isCorrect){btn.classList.add('correct');fb.className='feedback-bar show correct';fb.innerHTML=`<span class="fb-icon">✅</span><span class="fb-text correct">Correct!</span>`;quizState.correct++;}else{btn.classList.add('wrong');document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent.trim().slice(1).trim()===currentA)b.classList.add('correct');});fb.className='feedback-bar show wrong';fb.innerHTML=`<span class="fb-icon">✗</span><span class="fb-text wrong">Correct: ${esc(currentA)}</span>`;if(mode==='test'){quizState.hearts--;if(quizState.hearts<=0)quizState.total=quizState.maxQ;}renderExplanation(unitName,currentQ,currentA);}quizState.total++;nb.className='next-btn show';}
function nextQ(){const{total,maxQ,hearts}=quizState;if(total>=maxQ||hearts<=0){showResult();return;}renderQuestion();}
function showResult(){const{correct,maxQ,idx}=quizState;const pct=Math.round((correct/maxQ)*100);const passed=pct>=60,perfect=pct>=90;const emoji=perfect?'🌟':passed?'🎉':'😅';const title=perfect?'Perfect!':passed?'You passed!':'Keep practicing';const sub=perfect?'Outstanding! 3 stars.':passed?`${correct}/${maxQ} correct.`:`${correct}/${maxQ}. Try again!`;if(passed){const key=getKey(currentSubject,idx);if(perfect)progress[key]='perfect';else if(!progress[key])progress[key]=true;saveProgress();}document.getElementById('result-screen').innerHTML=`<div class="result-screen-inner"><div class="result-icon">${emoji}</div><div class="result-title">${title}</div><div class="result-sub">${sub}</div><div class="result-stats"><div class="stat-card"><div class="stat-val">${correct}/${maxQ}</div><div class="stat-label">Correct</div></div><div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-label">Score</div></div></div><button class="result-btn" onclick="showMap()">Back to path</button></div>`;showScreen('result-screen');}
// Subject selection overlay on first load
let hasSelectedSubject=false;
function showSubjectSelector(){const overlay=document.createElement('div');overlay.className='subject-selector-overlay';overlay.id='subject-selector';overlay.innerHTML=`<div class="subject-selector-card"><h2>📚 Welcome to Quantix</h2><p>Choose a subject to start your journey</p><div class="subject-grid" id="subject-grid"></div><button class="reset-btn" style="background:#f0f4f0;color:var(--text);margin-top:8px;" onclick="closeSelectorAndStart('Algebra 1')">Skip → Start Algebra 1</button></div>`;document.body.appendChild(overlay);const grid=document.getElementById('subject-grid');['Algebra 1','Algebra 2','Geometry','Pre-Calc','Calculus'].forEach(sub=>{const btn=document.createElement('button');btn.className='subject-choice-btn';btn.innerHTML=`<span>${sub==='Algebra 1'?'📐':sub==='Algebra 2'?'📊':sub==='Geometry'?'🔺':sub==='Pre-Calc'?'📡':'∫'}</span> ${sub}`;btn.onclick=()=>closeSelectorAndStart(sub);grid.appendChild(btn);});}
function closeSelectorAndStart(subject){const overlay=document.getElementById('subject-selector');if(overlay)overlay.remove();hasSelectedSubject=true;currentSubject=subject;document.querySelectorAll('.subject-btn').forEach(btn=>{btn.classList.toggle('active',btn.textContent.trim().endsWith(subject));});showMap();}
// On window load: check if first visit, show selector
window.addEventListener('load',()=>{const visited=localStorage.getItem('qx_visited');if(!visited){showSubjectSelector();localStorage.setItem('qx_visited','true');}else{showMap();}});
</script>
</body>
