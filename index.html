// ======================== QUIZ STATE ========================
let quizState = {};

function getUnitKey(s,i)         { return `${s}::unit_${i}`; }
function getUnitStatus(s,i)      { return progress[getUnitKey(s,i)] || null; }
function setUnitStatus(s,i,st)   { progress[getUnitKey(s,i)] = st; saveProgressToLevel(progress); }
function isUnitComplete(s,i)     { return getUnitStatus(s,i) === 'testPass'; }
function isUnlocked(s,i)         { return i === 0 || isUnitComplete(s,i-1); }
function getStarCount(s,i)       { const st=getUnitStatus(s,i); return st==='testPass'?3:st==='practicePass'?2:0; }
function isPracticePassed(s,i)   { const st=getUnitStatus(s,i); return st==='practicePass'||st==='testPass'; }

function resetAllProgress() {
  if (confirm('Reset ALL progress for current level?')) {
    progress = {}; saveProgressToLevel(progress); showMap(); updateStreakDisplay();
  }
}
function switchSubject(s) {
  currentSubject = s;
  localStorage.setItem('qx_current_subject', s);
  rebuildSidebar();
  showMap();
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function quitQuiz() { showMap(); }

function startQuiz(idx, mode) {
  const units = curriculum[currentSubject];
  const unit = units[idx];
  if (mode==='test' && !isPracticePassed(currentSubject,idx)) {
    alert("⚠️ You must pass Practice (70%) before attempting the Test!"); return;
  }
  const maxQ = mode==='practice' ? 20 : 10;
  const gradeForGen = currentSubject;

  quizState = { idx, mode, unitName:unit.name, grade:gradeForGen, hearts:mode==='test'?3:999,
                correct:0, total:0, maxQ, questions:[], currentIndex:0 };
  for (let i=0; i<maxQ; i++) {
    let difficulty = i < Math.floor(maxQ*0.4) ? 'easy' : (i < Math.floor(maxQ*0.75) ? 'medium' : 'hard');
    const [question, answer] = generateQuestionForGrade(gradeForGen, unit.name, difficulty);
    quizState.questions.push({ question, answer, difficulty });
  }
  renderQuestion(); showScreen('quiz-screen');
}

function renderQuestion() {
  const qs = document.getElementById('quiz-screen');
  const { maxQ, questions, currentIndex, mode, hearts, unitName } = quizState;
  if (currentIndex >= maxQ) { showResult(); return; }
  const current = questions[currentIndex];
  const prog = Math.round((currentIndex/maxQ)*100);
  const wrongOpts = generateWrongAnswers(current.answer, unitName, quizState.grade);
  const opts = shuffle([current.answer, ...wrongOpts.slice(0,3)]);
  const diffLabel = current.difficulty==='easy'?'🌱 EASY':current.difficulty==='medium'?'⚡ MEDIUM':'🔥 HARD';
  const heartHTML = mode==='test'
    ? Array.from({length:3},(_,i)=>`<span class="heart${i>=hearts?' lost':''}">❤️</span>`).join('')
    : '';
  qs.innerHTML = `<div class="q-screen">
    <div class="quiz-header-actions">
      <div class="quiz-stats">Q${currentIndex+1}/${maxQ} • ${mode==='practice'?'Practice':'Test'}</div>
      <button class="quit-quiz-btn" onclick="quitQuiz()">✕ Quit</button>
    </div>
    <div class="quiz-top">
      <div class="hearts">${heartHTML}</div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div>
    </div>
    <div class="q-card">
      <div class="difficulty-badge difficulty-${current.difficulty}">${diffLabel}</div>
      <div class="q-topic">${unitName}</div>
      <div class="q-text">${esc(current.question)}</div>
    </div>
    <div class="options" id="opts"></div>
    <div class="feedback-bar" id="fb"></div>
    <div id="expl-container"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">Continue →</button>
  </div>`;
  const optDiv = document.getElementById('opts');
  const letters = ['A','B','C','D'];
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${esc(opt)}</span>`;
    btn.onclick = () => checkAnswer(opt, btn);
    optDiv.appendChild(btn);
  });
  updateActiveOptions();
}

function checkAnswer(chosen, btn) {
  const { questions, currentIndex, mode, unitName, grade } = quizState;
  const current = questions[currentIndex];
  const isCorrect = chosen === current.answer;
  if (isCorrect) {
    btn.classList.add('correct');
    quizState.correct++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => {
      const txt = b.querySelector('span:last-child')?.innerText?.trim();
      if (txt === current.answer) b.classList.add('correct');
    });
    if (mode==='test') quizState.hearts--;
    renderExplanation(grade, unitName, current.question, current.answer, current.difficulty);
  }
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (isCorrect) {
    fb.className = 'feedback-bar show correct';
    fb.innerHTML = `<span class="fb-icon">✅</span><span class="fb-text correct">Correct!</span>`;
  } else {
    fb.className = 'feedback-bar show wrong';
    fb.innerHTML = `<span class="fb-icon">✗</span><span class="fb-text wrong">Correct answer: ${esc(current.answer)}</span>`;
  }
  quizState.total++;
  document.getElementById('next-btn').classList.add('show');
  if (mode==='test' && quizState.hearts <= 0) {
    setTimeout(() => document.getElementById('next-btn')?.click(), 800);
  }
}

function nextQ() {
  if (quizState.total >= quizState.maxQ || quizState.hearts <= 0) { showResult(); return; }
  quizState.currentIndex++;
  renderQuestion();
}

function showResult() {
  const { correct, maxQ, mode, idx } = quizState;
  const pct = Math.round((correct/maxQ)*100);
  const passThreshold = 70;
  const passed = pct >= passThreshold;
  const currentStatus = getUnitStatus(currentSubject, idx);
  let newStatus = currentStatus, message = "";
  if (mode==='practice' && passed && currentStatus!=='testPass') {
    newStatus='practicePass'; message=`🎉 Practice passed! ${correct}/${maxQ} (${pct}%). Test unlocked!`; recordStreakOnPass();
  } else if (mode==='test' && passed) {
    if (currentStatus!=='testPass') newStatus='testPass';
    message=`🏆 Test passed! ${correct}/${maxQ} (${pct}%). 3 stars!`; recordStreakOnPass();
  } else if (mode==='test' && !passed) {
    message=`❌ Test failed. ${pct}% — need ${passThreshold}%.`;
  } else if (mode==='practice' && !passed) {
    message=`📚 Practice score: ${pct}% (need ${passThreshold}%).`;
  }
  if (newStatus !== currentStatus && newStatus) setUnitStatus(currentSubject, idx, newStatus);
  const starCount = getStarCount(currentSubject, idx);
  document.getElementById('result-screen').innerHTML = `
    <div class="result-screen-inner">
      <div class="result-icon">${starCount===3?'🌟':starCount===2?'⭐':'😅'}</div>
      <div class="result-title">${starCount===3?'Perfect!':starCount===2?'Practice Passed':(mode==='test'?'Test Failed':'Keep Practicing')}</div>
      <div class="result-sub">${message || `${correct}/${maxQ} correct (${pct}%)`}</div>
      <div class="result-stats">
        <div class="stat-card"><div class="stat-val">${correct}/${maxQ}</div><div class="stat-label">Correct</div></div>
        <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-label">Score</div></div>
      </div>
      <button class="result-btn" onclick="showMap()">Back to Path</button>
    </div>`;
  showScreen('result-screen');
}

function showMap() {
  const units = curriculum[currentSubject];
  const ms = document.getElementById('map-screen');
  ms.innerHTML = `<div class="map-header">
    <div class="map-title">${currentSubject}</div>
    <div class="map-sub">⭐ Practice (20 Qs, 70%) → 2 stars | 🏆 Test (10 Qs, 70%) → 3 stars</div>
  </div><div class="trail" id="trail"></div>`;
  const trail = document.getElementById('trail');
  units.forEach((unit,i) => {
    const unlocked   = isUnlocked(currentSubject, i);
    const starCount  = getStarCount(currentSubject, i);
    let cls = starCount===3?'perfect':starCount===2?'complete':unlocked?'available':'locked';
    const starsDisplay = starCount===3?'★★★':starCount===2?'★★☆':'☆☆☆';
    const wrap = document.createElement('div'); wrap.className='checkpoint-wrap';
    if (i > 0) {
      const c = document.createElement('div');
      c.className = 'connector'+(isUnitComplete(currentSubject,i-1)?' done':'');
      wrap.appendChild(c);
    }
    const clickable = unlocked || starCount > 0 || i === 0;
    wrap.innerHTML += `
      <button class="checkpoint-btn ${cls}" ${clickable?`onclick="openUnit(${i})"`:''}>
        <span>${unit.icon}</span>
        ${starCount>0?`<span class="cp-stars">${starsDisplay}</span>`:''}
      </button>
      <div class="cp-label">${unit.name}</div>`;
    trail.appendChild(wrap);
  });
  showScreen('map-screen');
  const old = document.getElementById('unit-panel'); if (old) old.remove();
  updateStreakDisplay();
}

function openUnit(idx) {
  const units = curriculum[currentSubject];
  const unit = units[idx];
  const practicePassed = isPracticePassed(currentSubject, idx);
  const testPassed     = isUnitComplete(currentSubject, idx);
  const ms = document.getElementById('map-screen');
  const old = document.getElementById('unit-panel'); if (old) old.remove();
  const panel = document.createElement('div'); panel.id='unit-panel'; panel.className='unit-panel';
  const testDisabled = !practicePassed;
  panel.innerHTML = `
    <div class="unit-panel-title">${unit.icon} ${unit.name}</div>
    <div class="unit-panel-sub">${testPassed?'⭐ Unit complete! Replay anytime.':practicePassed?'✨ Practice passed! Take the test for 3rd star.':'📖 Complete practice (70%) to unlock test.'}</div>
    <div class="badge-container">
      ${practicePassed?`<span class="status-badge practice-pass">✅ Practice Passed (2★)</span>`:`<span class="status-badge locked">📘 Practice needed (70%)</span>`}
      ${testPassed?`<span class="status-badge test-pass">🏆 Test Passed (3★)</span>`:practicePassed?`<span class="status-badge locked">🎯 Test available (70%) for 3★</span>`:`<span class="status-badge locked">🔒 Test requires Practice first</span>`}
    </div>
    <div class="panel-actions">
      <button class="btn-practice" onclick="startQuiz(${idx},'practice')">📝 Practice (20 Qs • 70%)</button>
      <button class="btn-test ${testDisabled?'disabled':''}" ${testDisabled?'disabled':`onclick="startQuiz(${idx},'test')"`}>🎯 Test (10 Qs • 70%)</button>
    </div>
    ${testPassed?`<div class="locked-message" style="color:var(--gold-dark);">★ 3 stars! Replay to keep skills sharp.</div>`:practicePassed?`<div class="locked-message">🎯 Pass test (70%) for final star!</div>`:`<div class="locked-message">⚠️ Pass Practice first (70%) to unlock Test.</div>`}`;
  ms.appendChild(panel);
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ======================== STREAK ========================
function updateStreakDisplay() {
  const sc = document.getElementById('streak-count');
  if (sc) sc.textContent = getCurrentStreak();
}
function getCurrentStreak() {
  const last = localStorage.getItem('qx_streak_last_date');
  const streak = parseInt(localStorage.getItem('qx_streak') || '0');
  if (!last) return 0;
  const hoursDiff = (Date.now() - parseInt(last)) / (1000*60*60);
  return hoursDiff > 48 ? 0 : streak;
}
function recordStreakOnPass() {
  const now = Date.now();
  const last = localStorage.getItem('qx_streak_last_date');
  const current = parseInt(localStorage.getItem('qx_streak') || '0');
  if (!last) {
    localStorage.setItem('qx_streak','1');
    localStorage.setItem('qx_streak_last_date', now);
  } else {
    const h = (now - parseInt(last)) / (1000*60*60);
    if (h >= 24 && h < 48)      { localStorage.setItem('qx_streak', current+1); localStorage.setItem('qx_streak_last_date', now); }
    else if (h < 24)             { localStorage.setItem('qx_streak_last_date', now); }
    else                         { localStorage.setItem('qx_streak','1'); localStorage.setItem('qx_streak_last_date', now); }
  }
  updateStreakDisplay();
}

// ======================== KEYBOARD SHORTCUTS ========================
let currentActiveOptions = [];
function updateActiveOptions() { currentActiveOptions = Array.from(document.querySelectorAll('.opt-btn:not(:disabled)')); }
function selectAnswerByIndex(i) { updateActiveOptions(); if (currentActiveOptions[i] && !currentActiveOptions[i].disabled) currentActiveOptions[i].click(); }
function triggerContinue()      { const b=document.getElementById('next-btn'); if (b && b.classList.contains('show')) b.click(); }

document.addEventListener('keydown', e => {
  if (document.querySelector('.screen.active')?.id !== 'quiz-screen') return;
  const k = e.key;
  if      (k==='1'||k==='a'||k==='A') { e.preventDefault(); selectAnswerByIndex(0); }
  else if (k==='2'||k==='b'||k==='B') { e.preventDefault(); selectAnswerByIndex(1); }
  else if (k==='3'||k==='c'||k==='C') { e.preventDefault(); selectAnswerByIndex(2); }
  else if (k==='4'||k==='d'||k==='D') { e.preventDefault(); selectAnswerByIndex(3); }
  else if (k==='Enter')               { e.preventDefault(); triggerContinue(); }
  else if (k==='Escape')              { e.preventDefault(); showMap(); }
});

// ======================== INIT ========================
window.addEventListener('load', () => {
  if (!currentLevel) showLevelSelector();
  else { rebuildSidebar(); showMap(); updateStreakDisplay(); }
});
</script>
</body>
</html>
